services:
  seesam-core:
    image: python:3.12-slim
    container_name: seesam-core
    working_dir: /app
    volumes:
      - ./core:/app/core
      - ./data:/data
    command: python -m core.main
    ports:
      - "8000:8000"
    environment:
      SEESAM_DATA_DIR: /data
    restart: unless-stopped
